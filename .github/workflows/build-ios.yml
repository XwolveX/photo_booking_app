name: Build IPA

on:
  push:
    branches: [main]

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'

      - run: flutter pub get

      - run: flutter build ipa --no-codesign

      - name: Find IPA
        run: find $GITHUB_WORKSPACE -name "*.ipa"

      - uses: actions/upload-artifact@v4
        with:
          name: ipa-file
          path: build/ios/ipa/*.ipa