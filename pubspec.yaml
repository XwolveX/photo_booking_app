name: photo_booking_app
description: Photo Booking App - Connect Users with Photographers & Makeup Artists
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase Core
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4

  # UI & Icons
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  lottie: ^3.0.0

  # Utils
  shared_preferences: ^2.2.2
  provider: ^6.1.1
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1
  flutter_spinkit: ^5.2.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  http: ^1.2.0
  geolocator: ^11.0.0
  geocoding: ^3.0.0
  google_places_flutter: ^2.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true